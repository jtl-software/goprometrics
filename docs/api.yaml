openapi: 3.0.1
info:
  title: Goprometric metrics cache API
  version: 1.0.0
servers:
  - url: 'http://127.0.0.1:9111'
paths:

  /count/{ns}/{name}:
    put:
      operationId: IncCounter
      summary: Increment a counter
      description: Increment a counter
      parameters:
        - in: path
          name: ns
          required: true
          description: Namespace
          example: my_namespace
          schema:
            type: string
        - in: path
          name: name
          required: true
          description: Counter name
          example: my_counter
          schema:
            type: string
        - in: query
          name: add
          required: false
          description: Step width to add (defaults to 1.0; values <= 0 are ignored and default to 1.0)
          example: 1.4
          schema:
            type: number
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CounterRequest'
      responses:
        '200':
          description: Counter was incremented
        '201':
          description: Counter was created and incremented
        '400':
          description: Failed to handle metric request

  /sum/{ns}/{name}/{value}:
    put:
      operationId: Summary
      summary: Observe a Summary metric
      description: |
        Observe a metric using a summary
      parameters:
        - in: path
          name: ns
          required: true
          description: Namespace
          example: my_namespace
          schema:
            type: string
        - in: path
          name: name
          required: true
          description: Summary name
          example: my_summary
          schema:
            type: string
        - in: path
          name: value
          required: true
          description: Value to observe
          example: 0.435
          schema:
            type: number
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SummaryRequest'
      responses:
        '200':
          description: Summary was observed
        '201':
          description: Summary was created and observed
        '400':
          description: Failed to handle metric request

  /observe/{ns}/{name}/{value}:
    put:
      operationId: Histogram
      summary: Observe a Histogram metric
      description: |
        Observe a metric using a histogram
      parameters:
        - in: path
          name: ns
          required: true
          description: Namespace
          example: my_namespace
          schema:
            type: string
        - in: path
          name: name
          required: true
          description: Histogram name
          example: my_histogram
          schema:
            type: string
        - in: path
          name: value
          required: true
          description: Value to observe
          example: 0.435
          schema:
            type: number
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/HistogramRequest'
      responses:
        '200':
          description: Histogram was observed
        '201':
          description: Histogram was created and observed
        '400':
          description: Failed to handle metric request

  /gauge/{ns}/{name}/{value}:
    put:
      operationId: Gauge
      summary: Increase or decrease a gauge metric
      description: |
        Increase or decrease a gauge metric
      parameters:
        - in: path
          name: ns
          required: true
          description: Namespace
          example: my_namespace
          schema:
            type: string
        - in: path
          name: name
          required: true
          description: Gauge name
          example: my_gauge
          schema:
            type: string
        - in: path
          name: value
          required: true
          description: Value to add (or set, if useSet=1 is provided in the request body)
          example: -0.435
          schema:
            type: number
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GaugeRequest'
      responses:
        '200':
          description: Gauge was updated
        '201':
          description: Gauge was created and updated
        '400':
          description: Failed to handle metric request

components:

  schemas:

    CounterRequest:
      type: object
      properties:
        labels:
          type: string
          example: "path:/login,status:200"
        help:
          type: string
          example: "Describe metric a bit better"

    SummaryRequest:
      type: object
      properties:
        labels:
          type: string
          example: "path:/login,status:200"
        help:
          type: string
          example: "Describe metric a bit better"
        objectives:
          type: string
          example: "0.5:0.05,0.9:0.01,0.99:0.001"

    HistogramRequest:
      type: object
      properties:
        labels:
          type: string
          example: "path:/login,status:200"
        help:
          type: string
          example: "Describe metric a bit better"
        buckets:
          type: string
          example: "0.5,1.0,2.0,4.0"

    GaugeRequest:
      type: object
      properties:
        labels:
          type: string
          example: "worker:payment,status:200"
        help:
          type: string
          example: "Describe metric a bit better"
        useSet:
          type: string
          description: "Set to '1' to use Set() instead of Add() — replaces the current gauge value"
          example: "1"
